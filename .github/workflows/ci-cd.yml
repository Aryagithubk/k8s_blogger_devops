name: BloggerApp CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  EKS_CLUSTER_NAME: bloggerapp-eks
  AWS_REGION: ap-south-1

jobs:
  # -----------------------------------------------
  # Build & Push Backend Image
  # -----------------------------------------------
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      backend_changed: ${{ steps.changes.outputs.backend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for backend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'server/**'

      - name: Login to DockerHub
        if: steps.changes.outputs.backend == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Image
        if: steps.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bloggerapp-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bloggerapp-backend:${{ github.sha }}

  # -----------------------------------------------
  # Build & Push Frontend Image
  # -----------------------------------------------
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      frontend_changed: ${{ steps.changes.outputs.frontend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for frontend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'client/**'

      - name: Login to DockerHub
        if: steps.changes.outputs.frontend == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend Image
        if: steps.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bloggerapp-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bloggerapp-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api

  # -----------------------------------------------
  # Deploy to EKS
  # -----------------------------------------------
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Create/Update Namespaces
        run: |
          kubectl apply -f devops/k8s/namespaces.yaml

      - name: Deploy Backend Secret (if not exists)
        run: |
          kubectl apply -f devops/k8s/backend-secret.yaml
        continue-on-error: true

      - name: Deploy Backend
        if: needs.build-backend.outputs.backend_changed == 'true'
        run: |
          kubectl apply -f devops/k8s/backend-deployment.yaml
          kubectl set image deployment/backend-deployment \
            backend=${{ secrets.DOCKERHUB_USERNAME }}/bloggerapp-backend:${{ github.sha }} \
            -n backend

      - name: Deploy Frontend
        if: needs.build-frontend.outputs.frontend_changed == 'true'
        run: |
          kubectl apply -f devops/k8s/frontend-deployment.yaml
          kubectl set image deployment/frontend-deployment \
            frontend=${{ secrets.DOCKERHUB_USERNAME }}/bloggerapp-frontend:${{ github.sha }} \
            -n frontend

      - name: Verify Deployment
        run: |
          echo "=== Checking Backend ==="
          if [ "${{ needs.build-backend.outputs.backend_changed }}" == "true" ]; then
            kubectl rollout status deployment/backend-deployment -n backend --timeout=120s
          else
            echo "Backend unchanged. Skipping rollout wait."
          fi
          echo "=== Checking Frontend ==="
          if [ "${{ needs.build-frontend.outputs.frontend_changed }}" == "true" ]; then
            kubectl rollout status deployment/frontend-deployment -n frontend --timeout=120s
          else
            echo "Frontend unchanged. Skipping rollout wait."
          fi
          echo "=== All Pods ==="
          kubectl get pods -A
          echo "=== Services ==="
          kubectl get svc -A

