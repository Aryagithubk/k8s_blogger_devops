# Frontend Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: frontend
  labels:
    app: bloggerapp-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bloggerapp-frontend
  template:
    metadata:
      labels:
        app: bloggerapp-frontend
    spec:
      containers:
        - name: frontend
          image: aryasingh55/bloggerapp-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: frontend
  labels:
    app: bloggerapp-frontend
spec:
  type: LoadBalancer
  selector:
    app: bloggerapp-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
