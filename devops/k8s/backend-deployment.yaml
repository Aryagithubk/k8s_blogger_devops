# Backend Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: backend
  labels:
    app: bloggerapp-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bloggerapp-backend
  template:
    metadata:
      labels:
        app: bloggerapp-backend
    spec:
      containers:
        - name: backend
          image: aryasingh55/bloggerapp-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET
            - name: CLOUDINARY_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: CLOUDINARY_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5 #check response within this time
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: backend
  labels:
    app: bloggerapp-backend
spec:
  type: ClusterIP
  selector:
    app: bloggerapp-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
